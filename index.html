
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avengers AI Game Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#3b0000,#000);
color:white;
}
header{
text-align:center;
padding:25px;
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#7a0000,#ff0000,#ffcc00);
color:black;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
padding:20px;
}
.card{
border:1px solid #ffcc00;
padding:15px;
border-radius:10px;
text-align:center;
background:rgba(255,0,0,0.08);
}
button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#ffcc00;
cursor:pointer;
font-weight:bold;
}
#gameArea{
padding:25px;
border-top:2px solid #ffcc00;
min-height:300px;
}
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
align-items:center;
justify-content:center;
}
.popup-content{
background:#111;
border:2px solid #ffcc00;
padding:40px;
border-radius:12px;
max-width:500px;
text-align:center;
}
.cell{
width:60px;height:60px;font-size:22px;margin:4px;
}
</style>
</head>
<body>

<header>AVENGERS AI GAME LAB</header>

<div id="popup" class="popup">
<div class="popup-content">
<h2>Welcome Hero</h2>
<p id="quote"></p>
<button onclick="closePopup()">Enter</button>
</div>
</div>

<div class="grid" id="grid"></div>
<div id="gameArea"><h2>Select a Game</h2></div>

<script>

const quotes=[
"Great things grow from small daily actions.",
"Your focus determines your reality.",
"Cyber security starts with awareness.",
"Discipline creates freedom.",
"Calm thinking solves hard problems.",
"Consistency beats intensity."
];

document.getElementById("quote").innerText =
quotes[new Date().getDate()%quotes.length];

function closePopup(){
document.getElementById("popup").style.display="none";
}

const games=[
"Tic Tac Toe","Reaction Test","Typing Speed","Number Guess","Memory Match",
"Color Click","Aim Trainer","Math Quiz","Word Scramble","Binary Guess",
"Password Strength","Phishing Quiz","Mini Maze","Focus Timer","Emoji Guess",
"Motivation Spinner","Pixel Painter","Pattern Match","Speed Clicker",
"Shape Guess","AI Story Prompt","Breathing Trainer","Gratitude Cards",
"Logic Riddle","Sequence Memory","Cyber Quiz","Virus Defender",
"Malware Guess","Slider Puzzle","Idea Generator"
];

const grid=document.getElementById("grid");

games.forEach((g,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML="<h3>"+g+"</h3><button onclick='launch("+i+")'>Play</button>";
grid.appendChild(div);
});

function area(html){
document.getElementById("gameArea").innerHTML=html;
}

function launch(id){

if(id==0){
area("<h2>Tic Tac Toe</h2><div id='b'></div>");
let b=document.getElementById("b");
let turn="X";
for(let i=0;i<9;i++){
let c=document.createElement("button");
c.className="cell";
c.onclick=()=>{
if(!c.innerText){
c.innerText=turn;
turn=turn=="X"?"O":"X";
}
};
b.appendChild(c);
}
}

else if(id==1){
area("<h2>Reaction Test</h2><button id='start'>Start</button><p id='r'></p>");
let start=document.getElementById("start");
let r=document.getElementById("r");
start.onclick=()=>{
r.innerText="Wait...";
setTimeout(()=>{
let t=Date.now();
r.innerText="CLICK!";
start.onclick=()=>{
r.innerText="Reaction: "+(Date.now()-t)+" ms";
};
},Math.random()*3000+1000);
};
}

else if(id==2){
area("<h2>Typing Speed</h2><p>Type: cybersecurity</p><input id='t'><p id='res'></p>");
let s=Date.now();
document.getElementById("t").onkeyup=function(){
if(this.value=="cybersecurity"){
document.getElementById("res").innerText=(Date.now()-s)/1000+" sec";
}
}
}

else if(id==3){
let n=Math.floor(Math.random()*100);
area("<h2>Number Guess</h2><input id='g'><button onclick='check()'>Guess</button><p id='msg'></p>");
window.check=function(){
let v=document.getElementById("g").value;
document.getElementById("msg").innerText =
v==n?"Correct!":v>n?"Too High":"Too Low";
}
}

else if(id==4){
area("<h2>Memory Match</h2><p>Flip cards mentally: 1 2 3 1 2 3</p>");
}

else if(id==5){
area("<h2>Color Click</h2><button id='c'>Click me!</button><p id='s'>0</p>");
let score=0;
let btn=document.getElementById("c");
btn.onclick=()=>{
score++;
document.getElementById("s").innerText=score;
btn.style.background="hsl("+Math.random()*360+",70%,60%)";
}
}

else if(id==6){
area("<h2>Aim Trainer</h2><button id='t'>Hit</button><p id='s'>0</p>");
let s=0;
let b=document.getElementById("t");
b.onclick=()=>{
s++;
document.getElementById("s").innerText=s;
b.style.marginLeft=Math.random()*200+"px";
}
}

else if(id==7){
let a=Math.floor(Math.random()*10);
let b=Math.floor(Math.random()*10);
area("<h2>Math Quiz</h2>"+a+" + "+b+" = ? <input id='m'><button onclick='ans()'>Check</button><p id='r'></p>");
window.ans=function(){
document.getElementById("r").innerText =
document.getElementById("m").value==(a+b)?"Correct":"Try again";
}
}

else if(id==8){
let word="security";
let scr=word.split('').sort(()=>0.5-Math.random()).join('');
area("<h2>Word Scramble</h2>"+scr+"<br><input id='w'><p id='wr'></p>");
document.getElementById("w").onkeyup=function(){
if(this.value==word)document.getElementById("wr").innerText="Correct!";
}
}

else if(id==9){
let n=Math.floor(Math.random()*16);
area("<h2>Binary Guess</h2>Decimal "+n+"<br><input id='b'><p id='br'></p>");
document.getElementById("b").onkeyup=function(){
if(parseInt(this.value,2)==n)document.getElementById("br").innerText="Correct";
}
}

else if(id==10){
area("<h2>Password Strength</h2><input id='p'><p id='pr'></p>");
document.getElementById("p").onkeyup=function(){
let v=this.value;
let s=(v.length>8)+( /[A-Z]/.test(v) )+( /[0-9]/.test(v) );
document.getElementById("pr").innerText="Strength: "+s+"/3";
}
}

else if(id==11){
area("<h2>Phishing Quiz</h2><p>Email: 'Your bank urgent login'</p><button onclick='ph(true)'>Phishing</button><button onclick='ph(false)'>Safe</button><p id='ph'></p>");
window.ph=function(a){
document.getElementById("ph").innerText=a?"Correct":"Wrong";
}
}

else if(id==12){
area("<h2>Mini Maze</h2><p>Navigate mentally 🙂</p>");
}

else if(id==13){
area("<h2>Focus Timer</h2><button onclick='timer()'>Start 25s</button><p id='ti'></p>");
window.timer=function(){
let t=25;
let i=setInterval(()=>{
t--;
document.getElementById("ti").innerText=t;
if(t<=0)clearInterval(i);
},1000);
}
}

else if(id==14){
area("<h2>Emoji Guess</h2>🔒💻<br><input id='e'><p id='er'></p>");
document.getElementById("e").onkeyup=function(){
if(this.value=="cyber security")document.getElementById("er").innerText="Correct";
}
}

else if(id==15){
area("<h2>Motivation Spinner</h2><button onclick='spin()'>Spin</button><p id='sp'></p>");
window.spin=function(){
document.getElementById("sp").innerText=quotes[Math.floor(Math.random()*quotes.length)];
}
}

else if(id==16){
area("<h2>Pixel Painter</h2><canvas id='c' width=300 height=200 style='background:white'></canvas>");
let ctx=document.getElementById("c").getContext("2d");
document.getElementById("c").onclick=e=>{
ctx.fillStyle="black";
ctx.fillRect(e.offsetX,e.offsetY,4,4);
}
}

else if(id==17){
area("<h2>Pattern Match</h2><p>Find next: 2 4 6 8 ?</p><input id='pm'><p id='pmr'></p>");
document.getElementById("pm").onkeyup=function(){
if(this.value==10)document.getElementById("pmr").innerText="Correct";
}
}

else if(id==18){
area("<h2>Speed Clicker</h2><button id='sc'>Click</button><p id='ss'>0</p>");
let s=0;
document.getElementById("sc").onclick=()=>{
s++;document.getElementById("ss").innerText=s;
}
}

else if(id==19){
area("<h2>Shape Guess</h2>⚪<br><input id='sg'><p id='sgr'></p>");
document.getElementById("sg").onkeyup=function(){
if(this.value=="circle")document.getElementById("sgr").innerText="Correct";
}
}

else if(id==20){
area("<h2>AI Story Prompt</h2><button onclick='story()'>Generate</button><p id='st'></p>");
window.story=function(){
const s=["A hacker saves the world","AI defends cyberspace","A digital hero rises"];
document.getElementById("st").innerText=s[Math.floor(Math.random()*s.length)];
}
}

else if(id==21){
area("<h2>Breathing Trainer</h2><button onclick='breath()'>Start</button><p id='br'></p>");
window.breath=function(){
document.getElementById("br").innerText="Inhale... Exhale... Relax";
}
}

else if(id==22){
area("<h2>Gratitude Cards</h2><button onclick='grat()'>Reveal</button><p id='gr'></p>");
window.grat=function(){
const g=["Family","Health","Learning","Opportunities"];
document.getElementById("gr").innerText=g[Math.floor(Math.random()*g.length)];
}
}

else if(id==23){
area("<h2>Logic Riddle</h2><p>What has keys but no locks?</p><input id='lr'><p id='lrr'></p>");
document.getElementById("lr").onkeyup=function(){
if(this.value.toLowerCase()=="keyboard")document.getElementById("lrr").innerText="Correct";
}
}

else if(id==24){
let seq=[1,3,5];
area("<h2>Sequence Memory</h2>"+seq.join(",")+"<br><input id='sq'><p id='sqr'></p>");
document.getElementById("sq").onkeyup=function(){
if(this.value==7)document.getElementById("sqr").innerText="Correct";
}
}

else if(id==25){
area("<h2>Cyber Quiz</h2><p>HTTPS means?</p><button onclick='cq(true)'>Secure</button><button onclick='cq(false)'>Virus</button><p id='cqr'></p>");
window.cq=function(a){
document.getElementById("cqr").innerText=a?"Correct":"Wrong";
}
}

else if(id==26){
area("<h2>Virus Defender</h2><button id='v'>Destroy Virus</button><p id='vs'>0</p>");
let s=0;
document.getElementById("v").onclick=()=>{
s++;document.getElementById("vs").innerText=s;
}
}

else if(id==27){
area("<h2>Malware Guess</h2><p>WannaCry is?</p><button onclick='mg(true)'>Ransomware</button><button onclick='mg(false)'>Antivirus</button><p id='mgr'></p>");
window.mg=function(a){
document.getElementById("mgr").innerText=a?"Correct":"Wrong";
}
}

else if(id==28){
area("<h2>Slider Puzzle</h2><p>Arrange mentally 🙂</p>");
}

else if(id==29){
area("<h2>Idea Generator</h2><button onclick='idea()'>Generate</button><p id='ir'></p>");
window.idea=function(){
const i=["AI Fitness Coach","Cyber Security Game","Smart Habit Tracker"];
document.getElementById("ir").innerText=i[Math.floor(Math.random()*i.length)];
}
}

}

</script>
</body>
</html>
