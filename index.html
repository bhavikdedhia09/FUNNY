<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Hunt Pro Ultimate</title>

<style>
body {
  background: radial-gradient(circle, #1a0000, #000);
  color: #ffcc00;
  font-family: monospace;
  text-align: center;
}
h1 { text-shadow: 0 0 15px red; }

.grid {
  display: grid;
  grid-template-columns: repeat(10, 45px);
  gap: 5px;
  justify-content: center;
  margin: 20px;
}
.cell {
  width:45px;height:45px;
  border:1px solid #ff3b3b;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:#0a0a0a;
}
.selected { background:#00ffff;color:black;}
.found { background:#ffcc00;color:black;}

</style>
</head>

<body>

<h1>🤖 IRON CYBER HUNT ULTIMATE</h1>

<div>
Level: <span id="level">easy</span> |
⏱ <span id="timer">60</span>s |
🏆 <span id="score">0</span>
</div>

<button onclick="startGame()">Start / Restart</button>

<div id="grid" class="grid"></div>
<div id="wordList"></div>

<script>
const SIZE=10;

const LEVELS=["easy","medium","hard","expert","insane"];

const WORDS={
easy:["HACK","DATA","BUG","SAFE"],
medium:["MALWARE","PHISHING","ENCRYPT"],
hard:["RANSOMWARE","FIREWALL","EXPLOIT"],
expert:["STEGANOGRAPHY","HASHFUNCTION"],
insane:["ADVANCEDPERSISTENTTHREAT"]
};

let levelIndex=0;
let grid=[],selected=[],words=[],foundWords=[];
let score=0,timer=60,interval;
let dragging=false;

const dirs=[[0,1],[1,0],[1,1],[-1,1]];

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function createGrid(){
 grid=Array.from({length:SIZE},()=>Array(SIZE).fill(""));
}

function placeWord(word){
 let tries=0;
 while(tries<100){
  tries++;
  let d=dirs[Math.floor(Math.random()*dirs.length)];
  let r=Math.floor(Math.random()*SIZE);
  let c=Math.floor(Math.random()*SIZE);
  let ok=true;

  for(let i=0;i<word.length;i++){
   let nr=r+i*d[0],nc=c+i*d[1];
   if(nr<0||nc<0||nr>=SIZE||nc>=SIZE||(grid[nr][nc]&&grid[nr][nc]!=word[i])){
    ok=false;break;
   }
  }

  if(ok){
   for(let i=0;i<word.length;i++){
    let nr=r+i*d[0],nc=c+i*d[1];
    grid[nr][nc]=word[i];
   }
   return true;
  }
 }
 return false;
}

function fillRandom(){
 let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
 for(let i=0;i<SIZE;i++){
  for(let j=0;j<SIZE;j++){
   if(!grid[i][j]){
    grid[i][j]=chars[Math.floor(Math.random()*chars.length)];
   }
  }
 }
}

function render(){
 let g=document.getElementById("grid");
 g.innerHTML="";
 grid.forEach((row,r)=>{
  row.forEach((l,c)=>{
   let cell=document.createElement("div");
   cell.className="cell";
   cell.textContent=l;

   cell.onmousedown=()=>startSel(cell,r,c);
   cell.onmouseover=()=>dragSel(cell,r,c);

   g.appendChild(cell);
  });
 });
}

function startSel(cell,r,c){
 dragging=true;
 selected=[{r,c,cell}];
 cell.classList.add("selected");
}

function dragSel(cell,r,c){
 if(dragging){
  selected.push({r,c,cell});
  cell.classList.add("selected");
 }
}

document.addEventListener("mouseup",endSel);

function endSel(){
 if(!dragging) return;
 dragging=false;

 let word=selected.map(x=>grid[x.r][x.c]).join("");
 let rev=word.split("").reverse().join("");

 if(words.includes(word)||words.includes(rev)){
   let actual = words.includes(word)?word:rev;

   if(!foundWords.includes(actual)){
     foundWords.push(actual);
     score+=10;
     document.getElementById("score").innerText=score;
     selected.forEach(x=>x.cell.classList.add("found"));
   }
 }

 selected.forEach(x=>x.cell.classList.remove("selected"));
 selected=[];
 checkLevelComplete();
}

function checkLevelComplete(){
 if(foundWords.length===words.length){
   levelIndex++;
   if(levelIndex>=LEVELS.length){
     alert("🎉 You completed ALL levels! Final Score: "+score);
     resetGame();
     return;
   }
   alert("🚀 Level Up!");
   loadLevel();
 }
}

function startTimer(){
 clearInterval(interval);
 interval=setInterval(()=>{
  timer--;
  document.getElementById("timer").innerText=timer;

  if(timer<=0){
   clearInterval(interval);
   alert("❌ Failed! Score: "+score);
   resetGame();
  }
 },1000);
}

function loadLevel(){
 let level=LEVELS[levelIndex];
 document.getElementById("level").innerText=level;

 words=shuffle(WORDS[level]).slice(0,5);
 foundWords=[];

 createGrid();
 words.forEach(w=>placeWord(w));
 fillRandom();

 document.getElementById("wordList").innerText=words.join(", ");
 render();
}

function startGame(){
 score=0;
 timer=60;
 levelIndex=0;
 document.getElementById("score").innerText=score;
 loadLevel();
 startTimer();
}

function resetGame(){
 startGame();
}

startGame();
</script>

</body>
</html>
