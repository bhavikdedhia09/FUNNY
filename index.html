<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Hunt Pro</title>

<style>
body {
  background: #020617;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
}

h1 { text-shadow: 0 0 10px #00ffcc; }

.grid {
  display: grid;
  grid-template-columns: repeat(10, 45px);
  gap: 5px;
  justify-content: center;
  margin: 20px;
}

.cell {
  width: 45px;
  height: 45px;
  border: 1px solid #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.selected { background: #22c55e; color:black; }
.found { background: #ff00ff; color:white; }

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🔐 CYBER HUNT PRO</h1>

<div>
  ⏱ <span id="timer">60</span>s |
  🏆 <span id="score">0</span>
</div>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
  <option value="expert">Expert</option>
  <option value="insane">Insane</option>
</select>

<button onclick="startGame()">New Game</button>

<div id="grid" class="grid"></div>

<h3>Words</h3>
<div id="wordList"></div>

<script>
const SIZE = 10;
let grid = [];
let selectedCells = [];
let words = [];
let score = 0;
let timer = 60;
let interval;

const WORDS = {
  easy: ["HACK","DATA","BUG","SAFE"],
  medium: ["MALWARE","PHISHING","ENCRYPT"],
  hard: ["RANSOMWARE","FIREWALL","EXPLOIT"],
  expert: ["STEGANOGRAPHY","HASHFUNCTION"],
  insane: ["ADVANCEDPERSISTENTTHREAT"]
};

const directions = [[0,1],[1,0],[1,1],[-1,1]];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function createGrid() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(""));
}

function placeWord(word) {
  let attempts = 0;

  while (attempts < 100) {
    attempts++;

    const dir = directions[Math.floor(Math.random()*directions.length)];
    const row = Math.floor(Math.random()*SIZE);
    const col = Math.floor(Math.random()*SIZE);

    let fits = true;

    for (let i=0;i<word.length;i++) {
      let r = row + i*dir[0];
      let c = col + i*dir[1];

      if (r<0 || c<0 || r>=SIZE || c>=SIZE || (grid[r][c] && grid[r][c] !== word[i])) {
        fits = false;
        break;
      }
    }

    if (fits) {
      for (let i=0;i<word.length;i++) {
        let r = row + i*dir[0];
        let c = col + i*dir[1];
        grid[r][c] = word[i];
      }
      return true;
    }
  }
  return false;
}

function placeWords(wordList) {
  wordList.forEach(w => placeWord(w));
}

function fillRandom() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for (let i=0;i<SIZE;i++){
    for (let j=0;j<SIZE;j++){
      if (!grid[i][j]) {
        grid[i][j] = chars[Math.floor(Math.random()*chars.length)];
      }
    }
  }
}

function render() {
  const gridDiv = document.getElementById("grid");
  gridDiv.innerHTML = "";

  grid.forEach((row,r) => {
    row.forEach((letter,c) => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = letter;

      cell.onmousedown = () => startSelect(cell, r, c);
      cell.onmouseover = () => dragSelect(cell, r, c);
      cell.onmouseup = endSelect;

      gridDiv.appendChild(cell);
    });
  });
}

function startSelect(cell, r, c) {
  selectedCells = [{r,c,cell}];
  cell.classList.add("selected");
}

function dragSelect(cell, r, c) {
  if (selectedCells.length > 0) {
    selectedCells.push({r,c,cell});
    cell.classList.add("selected");
  }
}

function endSelect() {
  const word = selectedCells.map(x => grid[x.r][x.c]).join("");

  if (words.includes(word)) {
    score += 10;
    document.getElementById("score").innerText = score;
    selectedCells.forEach(x => x.cell.classList.add("found"));
  }

  selectedCells.forEach(x => x.cell.classList.remove("selected"));
  selectedCells = [];
}

function startTimer() {
  clearInterval(interval);

  interval = setInterval(() => {
    timer--;
    document.getElementById("timer").innerText = timer;

    if (timer <= 0) {
      clearInterval(interval);
      alert("Game Over! Score: " + score);
    }
  },1000);
}

function startGame() {
  const difficulty = document.getElementById("difficulty").value;
  words = shuffle(WORDS[difficulty]).slice(0, 5);

  createGrid();
  placeWords(words);
  fillRandom();

  score = 0;
  timer = 60;

  document.getElementById("score").innerText = score;
  document.getElementById("timer").innerText = timer;
  document.getElementById("wordList").innerText = words.join(", ");

  render();
  startTimer();
}

startGame();
</script>

</body>
</html>
