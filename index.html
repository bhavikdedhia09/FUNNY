
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avengers AI Game Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background: radial-gradient(circle at top,#2b0000,#000);
color:white;
}

header{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#7a0000,#b30000,#ffcc00);
color:black;
font-size:32px;
font-weight:bold;
letter-spacing:2px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(255,0,0,0.08);
border:1px solid #ffcc00;
border-radius:12px;
padding:20px;
text-align:center;
box-shadow:0 0 15px rgba(255,0,0,0.4);
}

button{
padding:10px 16px;
background:#ffcc00;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
}

#gameArea{
padding:30px;
border-top:2px solid #ffcc00;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
}

.popup-content{
background:#111;
border:2px solid #ffcc00;
padding:40px;
border-radius:12px;
max-width:500px;
text-align:center;
}

.close{
margin-top:20px;
}
</style>
</head>

<body>

<header>AVENGERS AI GAME LAB</header>

<div id="welcomePopup" class="popup">
<div class="popup-content">
<h2>Welcome Hero</h2>
<p id="quote"></p>
<button class="close" onclick="closePopup()">Enter Game Lab</button>
</div>
</div>

<div class="grid" id="gameGrid"></div>

<div id="gameArea"></div>

<script>

const quotes=[
"Discipline beats motivation.",
"Small progress every day creates big results.",
"Your future is built by what you do today.",
"Focus on progress not perfection.",
"Cyber security begins with awareness.",
"Think like a hacker to defend like a hero.",
"Consistency builds mastery.",
"Calm mind solves complex problems.",
"Learning never stops in technology.",
"Your mindset defines your success."
];

const today=new Date().getDate();
document.getElementById("quote").innerText=quotes[today % quotes.length];

function closePopup(){
document.getElementById("welcomePopup").style.display="none";
}

const games=[
"Tic Tac Toe","Reaction Test","Typing Speed","Number Guess",
"Memory Flip","Color Click","Aim Trainer","Math Quiz",
"Word Scramble","Binary Guess","Password Builder",
"Phishing Detector","Maze Runner","Focus Timer",
"Emoji Guess","Motivation Spinner","Pixel Painter",
"Pattern Match","Speed Clicker","Shape Fit",
"AI Story Prompt","Breathing Trainer","Gratitude Match",
"Logic Puzzle","Sequence Memory","Cyber Quiz",
"Network Defender","Malware Guess","Puzzle Slider","Idea Generator"
];

const grid=document.getElementById("gameGrid");

games.forEach((g,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML="<h3>"+g+"</h3><button onclick='launchGame("+i+")'>Play</button>";
grid.appendChild(div);
});

function launchGame(id){

let area=document.getElementById("gameArea");

if(id==0){
area.innerHTML=`
<h2>Tic Tac Toe</h2>
<div id="board"></div>
`;

let board=document.getElementById("board");
let cells=[];
let turn="X";

for(let i=0;i<9;i++){
let c=document.createElement("button");
c.style.width="60px";
c.style.height="60px";
c.style.margin="5px";
c.onclick=function(){
if(c.innerText==""){
c.innerText=turn;
turn=turn=="X"?"O":"X";
}
}
board.appendChild(c);
cells.push(c);
}

}

else if(id==1){

area.innerHTML=`
<h2>Reaction Speed Test</h2>
<button id="start">Start</button>
<p id="result"></p>
`;

let start=document.getElementById("start");
let result=document.getElementById("result");

start.onclick=function(){
result.innerText="Wait...";
let delay=Math.random()*3000+1000;

setTimeout(()=>{
let startTime=Date.now();
result.innerText="CLICK NOW!";

start.onclick=function(){
let reaction=Date.now()-startTime;
result.innerText="Reaction: "+reaction+" ms";
};
},delay);
};

}

else if(id==2){

area.innerHTML=`
<h2>Typing Speed Test</h2>
<p>Type: cybersecurity</p>
<input id="typeBox"/>
<p id="typeResult"></p>
`;

let box=document.getElementById("typeBox");
let start=Date.now();

box.onkeyup=function(){
if(box.value=="cybersecurity"){
let time=(Date.now()-start)/1000;
document.getElementById("typeResult").innerText="Time: "+time+" seconds";
}
}

}

else{

area.innerHTML="<h2>"+games[id]+"</h2><p>Mini relaxing game concept placeholder. Expand with custom logic.</p>";

}

}

</script>

</body>
</html>
