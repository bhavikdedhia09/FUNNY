<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Health Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
margin:0;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
color:#22c55e;
}

.card{
background:#0f172a;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
width:140px;
}

button{
padding:10px 16px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#16a34a;
}

.challenge{
font-size:22px;
color:#facc15;
min-height:40px;
margin:10px;
}

.badge{
display:inline-block;
background:#22c55e;
padding:10px;
margin:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.progress{
background:#334155;
height:18px;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.bar{
background:#22c55e;
height:18px;
width:0%;
}

.level{
color:#38bdf8;
font-size:20px;
}

canvas{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Ultimate Health AI Dashboard</h1>

<div class="card">

<h2>Health Input</h2>

<input id="age" placeholder="Age">
<input id="height" placeholder="Height cm">
<input id="weight" placeholder="Weight kg"><br>

<input id="sleep" placeholder="Sleep hrs">
<input id="steps" placeholder="Steps">
<input id="water" placeholder="Water L">
<input id="stress" placeholder="Stress 1-10"><br>

<button onclick="analyze()">Analyze Health</button>

</div>

<div class="card">

<h2>Health Score</h2>

<canvas id="meter" width="200" height="200"></canvas>
<div id="scoreText"></div>

</div>

<div class="card">

<h2>Health Trend</h2>

<canvas id="chart" width="400" height="200"></canvas>

</div>

<div class="card">

<h2>Health Level System</h2>

<div class="level">Level <span id="level">1</span></div>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>

<div id="xpText"></div>

</div>

<div class="card">

<h2>Streak</h2>

<div id="streak">0 Days</div>

</div>

<div class="card">

<h2>Daily Challenge</h2>

<div id="challenge" class="challenge"></div>

<button onclick="completeChallenge()">Complete Challenge</button>
<button onclick="newChallenge()">New Challenge</button>

</div>

<div class="card">

<h2>Health Badges</h2>

<div id="badges"></div>

<canvas id="badgeCanvas" width="500" height="300" style="display:none"></canvas>

</div>

</div>

<script>

const baseChallenges=[
"Walk 8000 steps",
"Drink 2 liters of water",
"Meditate for 5 minutes",
"Stretch for 10 minutes",
"Eat a fruit",
"Sleep before 11 PM",
"Do 20 squats",
"Take stairs instead of elevator",
"Avoid sugar today",
"Practice deep breathing"
];

let challenges=[];
for(let i=0;i<350;i++){
challenges.push(baseChallenges[i%baseChallenges.length]+" (#"+(i+1)+")");
}

let challengePool=[];
let currentChallenge="";

function resetChallenges(){
challengePool=[...challenges].sort(()=>Math.random()-0.5);
}

function newChallenge(){

if(challengePool.length===0) resetChallenges();

currentChallenge=challengePool.pop();

document.getElementById("challenge").innerText=currentChallenge;

}

let xp=0;
let level=1;

function gainXP(v){

xp+=v;

let nextLevel=level*100;

if(xp>=nextLevel){
level++;
xp=0;
alert("Level Up!");
}

updateXP();

}

function updateXP(){

document.getElementById("level").innerText=level;

let percent=(xp/(level*100))*100;

document.getElementById("xpBar").style.width=percent+"%";

document.getElementById("xpText").innerText=xp+" XP";

}

let streak=0;

function updateStreak(){

streak++;

document.getElementById("streak").innerText=streak+" Days";

}

let badges=[];

function awardBadge(task){

let date=new Date().toLocaleDateString();

badges.push({task,date});

renderBadges();

}

function renderBadges(){

let html="";

badges.forEach((b,i)=>{

html+=`
<div class="badge" onclick="downloadBadge(${i})">
Badge<br>
<small>${b.date}</small>
</div>
`;

});

document.getElementById("badges").innerHTML=html;

}

function downloadBadge(i){

let b=badges[i];

let canvas=document.getElementById("badgeCanvas");
let ctx=canvas.getContext("2d");

ctx.fillStyle="#020617";
ctx.fillRect(0,0,500,300);

ctx.fillStyle="#22c55e";
ctx.font="28px Arial";
ctx.textAlign="center";
ctx.fillText("HEALTH ACHIEVEMENT BADGE",250,70);

ctx.fillStyle="#38bdf8";
ctx.font="18px Arial";
ctx.fillText("Task: "+b.task,250,150);

ctx.fillStyle="#ffffff";
ctx.font="16px Arial";
ctx.fillText("Date: "+b.date,250,220);

setTimeout(()=>{

let link=document.createElement("a");

link.download="health_badge.png";

link.href=canvas.toDataURL();

link.click();

},100);

}

function completeChallenge(){

if(!currentChallenge){
alert("Generate challenge first");
return;
}

gainXP(50);

updateStreak();

awardBadge(currentChallenge);

}

let scores=[];

function analyze(){

let h=value("height");
let w=value("weight");

if(h===0||w===0){
alert("Enter height and weight");
return;
}

let bmi=w/((h/100)*(h/100));

let score=100;

if(bmi<18||bmi>25) score-=15;

scores.push(score);

drawMeter(score);

drawChart();

document.getElementById("scoreText").innerText="Health Score: "+score;

}

function drawMeter(score){

let c=document.getElementById("meter");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,200,200);

ctx.beginPath();
ctx.arc(100,100,80,0,2*Math.PI);
ctx.strokeStyle="#334155";
ctx.lineWidth=15;
ctx.stroke();

let angle=(score/100)*2*Math.PI;

ctx.beginPath();
ctx.arc(100,100,80,-Math.PI/2,angle-Math.PI/2);
ctx.strokeStyle="#22c55e";
ctx.lineWidth=15;
ctx.stroke();

}

function drawChart(){

let c=document.getElementById("chart");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,400,200);

ctx.beginPath();

scores.forEach((s,i)=>{

let x=i*40;
let y=200-(s*2);

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

});

ctx.strokeStyle="#22c55e";
ctx.stroke();

}

function value(id){
return parseFloat(document.getElementById(id).value)||0;
}

resetChallenges();
newChallenge();

</script>

</body>
</html>
