
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Games & Health Hub</title>
<style>
body{
font-family:Arial, sans-serif;
background:#0b0f19;
color:white;
text-align:center;
margin:0;
padding:0;
}
header{
background:#111a2e;
padding:20px;
font-size:28px;
}
section{
padding:30px;
border-bottom:1px solid #1f2a44;
}
button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
.game-btn{background:#00ffd5;color:black;}
.board{
display:grid;
grid-template-columns:repeat(3,80px);
gap:5px;
justify-content:center;
margin:auto;
}
.cell{
width:80px;height:80px;
background:#1a2238;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}
.memory-grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
}
.card{
height:80px;
background:#1a2238;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}
table{margin:auto;border-collapse:collapse;}
td{border:1px solid #888;}
td input{
width:40px;height:40px;
text-align:center;font-size:18px;
}
iframe{border:none;margin-top:20px;}
</style>
</head>

<body>

<header>🎮 Games & 🩺 Health Interactive Hub</header>

<section>
<h2>Tic Tac Toe</h2>
<div class="board" id="board"></div>
<p id="status">Player X Turn</p>
<button class="game-btn" onclick="restartGame()">Restart</button>
</section>

<section>
<h2>Match Finder (Memory)</h2>
<div class="memory-grid" id="memoryGame"></div>
</section>

<section>
<h2>Sudoku Grid</h2>
<table id="sudoku"></table>
</section>

<section>
<h2>Math Riddles</h2>
<p id="riddle"></p>
<button class="game-btn" onclick="nextRiddle()">Next Riddle</button>
</section>

<section>
<h2>Crossword Mini</h2>
<p>Clue: Protection from hackers (8 letters)</p>
<input maxlength="8" id="crossword">
<button onclick="checkCross()">Check</button>
<p id="crossResult"></p>
</section>

<section>
<h2>Health Habit Generator</h2>
<button class="game-btn" onclick="healthTask()">Get Healthy Habit</button>
<p id="task"></p>
</section>

<section>
<h2>Health Calculators</h2>
<p>BMI Calculator</p>
<iframe src="https://www.calculator.net/bmi-calculator.html" width="100%" height="500"></iframe>
<p>Calorie Calculator</p>
<iframe src="https://www.calculator.net/calorie-calculator.html" width="100%" height="500"></iframe>
</section>

<script>

/* TicTacToe */
let board=["","","","","","","","",""]
let current="X"
let active=true
const boardDiv=document.getElementById("board")

function drawBoard(){
boardDiv.innerHTML=""
board.forEach((v,i)=>{
let d=document.createElement("div")
d.className="cell"
d.innerText=v
d.onclick=()=>move(i)
boardDiv.appendChild(d)
})
}
drawBoard()

function move(i){
if(board[i]||!active) return
board[i]=current
checkWin()
current=current==="X"?"O":"X"
document.getElementById("status").innerText="Player "+current+" Turn"
drawBoard()
}

function checkWin(){
const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]
for(let c of w){
if(board[c[0]]&&board[c[0]]===board[c[1]]&&board[c[1]]===board[c[2]]){
document.getElementById("status").innerText="Winner "+board[c[0]]
active=false
}
}
}

function restartGame(){
board=["","","","","","","","",""]
active=true
current="X"
drawBoard()
}

/* Memory Game */
let icons=["💻","💻","🔐","🔐","🦠","🦠","⚡","⚡"]
icons.sort(()=>0.5-Math.random())
const mem=document.getElementById("memoryGame")
icons.forEach(i=>{
let c=document.createElement("div")
c.className="card"
c.onclick=()=>c.innerText=i
mem.appendChild(c)
})

/* Sudoku */
const sudoku=document.getElementById("sudoku")
for(let i=0;i<9;i++){
let row=document.createElement("tr")
for(let j=0;j<9;j++){
let cell=document.createElement("td")
let inp=document.createElement("input")
inp.maxLength=1
cell.appendChild(inp)
row.appendChild(cell)
}
sudoku.appendChild(row)
}

/* Riddles */
let riddles=[
"I am an odd number. Remove one letter and I become even.",
"What three numbers give same result when multiplied or added?",
"If two’s company and three’s a crowd, what are four and five?",
"What number increases by 50% when turned upside down?"
]
let r=0
function nextRiddle(){
document.getElementById("riddle").innerText=riddles[r]
r=(r+1)%riddles.length
}
nextRiddle()

/* Crossword */
function checkCross(){
let ans=document.getElementById("crossword").value.toUpperCase()
if(ans==="FIREWALL"){
document.getElementById("crossResult").innerText="Correct!"
}else{
document.getElementById("crossResult").innerText="Try Again"
}
}

/* Health Tasks */
let tasks=[
"Drink 2 glasses of water",
"Walk for 10 minutes",
"Stretch your back",
"Eat a fruit today",
"Take a 5 minute deep breathing break",
"Sleep at least 7 hours tonight",
"Reduce screen time for 30 minutes",
"Do 10 pushups or light exercise",
"Practice gratitude",
"Stand and stretch your legs"
]

function healthTask(){
let t=Math.floor(Math.random()*tasks.length)
document.getElementById("task").innerText=tasks[t]
}

</script>

</body>
</html>
